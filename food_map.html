<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Map</title>
    <style>
        :root {
            --brand-blue: #00aee5;
            --brand-green: #7cc033;
            --bg-body: #f0f2f5;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-body); padding: 20px; overflow-x: hidden; margin: 0; min-height: 100vh; position: relative; }
        
        /* الخلفية المتحركة (Light Leaks) */
        .blob { position: absolute; width: 300px; height: 300px; border-radius: 50%; filter: blur(80px); opacity: 0.6; z-index: -1; animation: move 10s infinite alternate; }
        .blue { background: var(--brand-blue); top: -50px; left: -50px; }
        .green { background: var(--brand-green); bottom: -50px; right: -50px; animation-delay: 2s; }
        @keyframes move { from { transform: translate(0, 0); } to { transform: translate(100px, 100px); } }

        .container { max-width: 500px; margin: 20px auto; padding: 30px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); position: relative; }
        .logo-box { display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        .logo-box img { width: 150px; height: auto; display: block; }
        h1 { color: var(--brand-blue); text-align: center; margin: 0 auto 30px auto; font-size: 28px; border-bottom: 3px solid var(--brand-green); padding-bottom: 10px; width: fit-content; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--brand-blue); font-weight: 600; }
        input, select { width: 100%; padding: 14px; border: 2px solid #e1e1e1; border-radius: 12px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: var(--brand-green); color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #68a82d; }
        #output { margin-top: 25px; padding: 25px; background: #f9f9f9; border-radius: 15px; border: 1px solid var(--brand-green); display: none; }
    </style>
</head>
<body>

    <!-- كرات الخلفية -->
    <div class="blob blue"></div>
    <div class="blob green"></div>

<div class="container">
    <div class="logo-box">
        <img src="Logo_Dr_Aya.webp" alt="Food Map Logo">
    </div>
    <h1>Food Map</h1>
    
    <div id="inputForm">
        <div class="form-group"><label>اسم المريض:</label><input type="text" id="name"></div>
        <div class="form-group"><label>BMI:</label><input type="number" id="bmi"></div>
        <div class="form-group"><label>نسبة الدهون (%):</label><input type="number" id="fat"></div>
        <div class="form-group"><label>الماكروز (مثال: 40/30/30):</label><input type="text" id="macros"></div>
        <div class="form-group"><label>نوع الدايت:</label>
            <select id="dietType">
                <option value="balanced">متوازن</option>
                <option value="keto">كيتو</option>
            </select>
        </div>
        <button onclick="processDiet()">تسجيل وعرض الدايت</button>
    </div>

    <div id="output">
        <h3 style="color: var(--brand-green);">نتائج الخطة</h3>
        <div id="dietResult"></div>
        <button onclick="window.print()" style="background: var(--brand-blue);">طباعة التقرير</button>
    </div>
</div>

<script>
    async function processDiet() {
        const payload = {
            name: document.getElementById('name').value,
            bmi: document.getElementById('bmi').value,
            fat: document.getElementById('fat').value,
            macros: document.getElementById('macros').value,
            dietType: document.getElementById('dietType').value
        };

        const url = 'https://script.google.com/macros/s/AKfycbz1hYe0fh5CbYKqdZb4DdG14RR04-eeuCjJVdkVPtNHgi0Qhw350k7kRJ0WeGy1CHAf/exec';

        try {
            const response = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
            const result = await response.json();
            
            document.getElementById('dietResult').innerHTML = `
                <p><strong>المريض:</strong> ${payload.name}</p>
                <p><strong>الخطة:</strong> ${result.diet}</p>
            `;
            document.getElementById('inputForm').style.display = 'none';
            document.getElementById('output').style.display = 'block';
        } catch (e) {
            alert("حدث خطأ في الاتصال.");
        }
    }
</script>

</body>
</html>
