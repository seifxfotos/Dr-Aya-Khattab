<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand-blue: #00aee5; --brand-green: #7cc033; --bg-body: #f0f2f5; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-body); margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; padding: 20px 0; }
        
        /* الأنيميشن مع will-change لضمان عدم التقطيع */
        .blob { position: fixed; width: 300px; height: 300px; border-radius: 50%; filter: blur(80px); opacity: 0.5; z-index: 1; animation: move 10s infinite alternate ease-in-out; will-change: transform; }
        .blue { background: var(--brand-blue); top: 10%; left: 10%; }
        .green { background: var(--brand-green); bottom: 10%; right: 10%; animation-delay: 2s; }
        @keyframes move { from { transform: translate(0, 0); } to { transform: translate(50px, 50px); } }
        
        .container { width: 90%; max-width: 450px; padding: 25px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; z-index: 10; }
        .logo-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo-box img { width: 120px; }
        
        /* البحث والأنيميشن الخاص به */
        .search-icon { cursor: pointer; color: var(--brand-blue); transition: transform 0.2s; }
        .search-icon:hover { transform: scale(1.1); }
        #searchOverlay { 
            display: none; opacity: 0; transform: translateY(-10px); 
            transition: all 0.3s ease; will-change: transform, opacity;
            margin-bottom: 20px; padding: 15px; background: #fff; border: 1px solid #eee; border-radius: 15px; 
        }
        
        h1 { color: var(--brand-blue); text-align: center; margin: 0 auto 20px; border-bottom: 3px solid var(--brand-green); padding-bottom: 8px; width: fit-content; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--brand-blue); font-weight: 700; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e1e1e1; border-radius: 12px; font-size: 16px; box-sizing: border-box; font-family: 'Cairo'; }
        button { width: 100%; padding: 14px; background: var(--brand-green); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; font-family: 'Cairo'; }
        #output { margin-top: 20px; padding: 20px; background: #f9f9f9; border-radius: 15px; border: 1px solid var(--brand-green); display: none; }
    </style>
</head>
<body>
    <div class="blob blue"></div>
    <div class="blob green"></div>

<div class="container">
    <div class="logo-box">
        <div style="width: 40px;"></div>
        <img src="Logo_Dr_Aya.webp" alt="Logo">
        <div class="search-icon" onclick="toggleSearch()">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </div>
    </div>
    
    <div id="searchOverlay">
        <input type="text" id="searchName" placeholder="اكتب اسم العميل...">
        <button onclick="searchPatient()" style="background:var(--brand-blue)">بحث</button>
    </div>

    <h1>Food Map</h1>
    
    <div id="inputForm">
        <div class="form-group"><label>اسم العميل:</label><input type="text" id="name"></div>
        <div class="form-group"><label>BMI:</label><input type="number" id="bmi"></div>
        <div class="form-group"><label>الدهون (%):</label><input type="number" id="fat"></div>
        <div class="form-group"><label>الماكروز:</label><input type="text" id="macros"></div>
        <div class="form-group"><label>الدايت:</label>
            <select id="dietType"><option value="متوازن">متوازن</option><option value="كيتو">كيتو</option></select>
        </div>
        <button onclick="processDiet()">تسجيل عميل جديد</button>
    </div>

    <div id="output">
        <h3 style="color: var(--brand-green);">بيانات العميل</h3>
        <div id="dietResult"></div>
        <button onclick="window.print()" style="background: var(--brand-blue);">طباعة التقرير</button>
        <button onclick="location.reload()" style="background: #999;">رجوع</button>
    </div>
</div>

<script>
    const url = 'https://script.google.com/macros/s/AKfycbzbINS4WTULNh9jtbc3LSLA18iwgWPS6IbIik0TglGNpbgjD_mIp5gxAWH6fokW2v4/exec';

    function toggleSearch() {
        const box = document.getElementById('searchOverlay');
        if (box.style.display === 'block') {
            box.style.opacity = '0';
            box.style.transform = 'translateY(-10px)';
            setTimeout(() => { box.style.display = 'none'; }, 300);
        } else {
            box.style.display = 'block';
            requestAnimationFrame(() => {
                box.style.opacity = '1';
                box.style.transform = 'translateY(0)';
            });
        }
    }

    async function searchPatient() {
        const name = document.getElementById('searchName').value;
        const res = await fetch(url + '?name=' + encodeURIComponent(name));
        const data = await res.json();
        if(data.error) alert("غير موجود");
        else {
            document.getElementById('name').value = name;
            document.getElementById('bmi').value = data.bmi;
            document.getElementById('fat').value = data.fat;
            document.getElementById('macros').value = data.macros;
            document.getElementById('dietType').value = data.dietType;
            showResult(name, "BMI: " + data.bmi);
        }
    }

    async function processDiet() {
        const payload = { name: document.getElementById('name').value, bmi: document.getElementById('bmi').value, fat: document.getElementById('fat').value, macros: document.getElementById('macros').value, dietType: document.getElementById('dietType').value };
        await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
        showResult(payload.name, "تم التسجيل بنجاح");
    }

    function showResult(name, info) {
        document.getElementById('dietResult').innerHTML = `<p><strong>العميل:</strong> ${name}</p><p><strong>التفاصيل:</strong> ${info}</p>`;
        document.getElementById('inputForm').style.display = 'none';
        document.getElementById('output').style.display = 'block';
        document.getElementById('searchOverlay').style.display = 'none';
    }
</script>
</body>
</html>
