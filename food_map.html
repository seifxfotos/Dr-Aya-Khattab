<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand-blue: #00aee5; --brand-green: #7cc033; --bg-body: #f0f2f5; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-body); margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; padding: 20px 0; }
        
        .blob { position: fixed; width: 300px; height: 300px; border-radius: 50%; filter: blur(80px); opacity: 0.5; z-index: 1; animation: move 10s infinite alternate ease-in-out; will-change: transform; }
        .blue { background: var(--brand-blue); top: 10%; left: 10%; }
        .green { background: var(--brand-green); bottom: 10%; right: 10%; animation-delay: 2s; }
        @keyframes move { from { transform: translate(0, 0); } to { transform: translate(50px, 50px); } }
        
        .container { width: 90%; max-width: 450px; padding: 25px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; z-index: 10; }
        .logo-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-box img { width: 120px; }
        
        .icon { cursor: pointer; color: var(--brand-blue); transition: 0.3s; display: flex; align-items: center; }
        .icon:hover { transform: scale(1.1); }
        
        #searchOverlay, #patientsModal { display: none; margin-bottom: 20px; padding: 15px; background: #fff; border: 1px solid #eee; border-radius: 15px; }
        #patientsModal { position: fixed; top: 10%; width: 90%; max-width: 450px; z-index: 100; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        h1 { color: var(--brand-blue); text-align: center; margin: 0 auto 20px; border-bottom: 3px solid var(--brand-green); padding-bottom: 8px; width: fit-content; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #e1e1e1; border-radius: 12px; font-family: 'Cairo'; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--brand-green); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-family: 'Cairo'; }
        
        .print-hide { display: inline; }
        #dietTableArea { margin-top:15px; border-top:1px solid #ccc; padding-top:10px; }
        
        @media print { .blob, .logo-box, .icon, button, .print-hide { display: none !important; } body { background: white; } .container { box-shadow: none; border: 1px solid #ccc; } }
    </style>
</head>
<body>
    <div class="blob blue"></div><div class="blob green"></div>

<div class="container">
    <div class="logo-box">
        <div class="icon" onclick="showAllPatients()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        </div>
        <img src="Logo_Dr_Aya.webp" alt="Logo">
        <div class="icon" onclick="toggleSearch()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </div>
    </div>
    
    <div id="searchOverlay"><input type="text" id="searchName" placeholder="اكتب اسم العميل..."><button onclick="searchPatient()" style="background:var(--brand-blue)">بحث</button></div>
    <div id="patientsModal"><h3>قائمة العملاء</h3><div id="patientsList"></div><button onclick="this.parentElement.style.display='none'">إغلاق</button></div>

    <h1>Food Map</h1>
    <div id="inputForm">
        <input type="text" id="name" placeholder="اسم العميل">
        <input type="number" id="bmi" placeholder="BMI">
        <input type="number" id="fat" placeholder="الدهون %">
        <input type="text" id="macros" placeholder="الماكروز">
        <select id="dietType"><option value="متوازن">متوازن</option><option value="كيتو">كيتو</option></select>
        <button onclick="processDiet()">تسجيل / تحديث بيانات العميل</button>
    </div>
    <div id="output" style="display:none;"><h3>بيانات العميل</h3><div id="dietResult"></div><button onclick="window.print()">طباعة</button><button onclick="location.reload()" style="background:#999">رجوع</button></div>
</div>

<script>
    const url = 'https://script.google.com/macros/s/AKfycbxK3EIUuRS6jbRKO_ro7fmRsHKhWjN5wHxM7F54cmvA7sNvp8uYamkkHTpJ2ocRXPR7/exec';
    
    function toggleSearch() { const el = document.getElementById('searchOverlay'); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
    
    async function showAllPatients() {
        const modal = document.getElementById('patientsModal');
        const listDiv = document.getElementById('patientsList');
        modal.style.display = 'block';
        listDiv.innerHTML = "جاري تحميل القائمة...";
        try {
            const res = await fetch(url + '?action=all');
            const list = await res.json();
            listDiv.innerHTML = list.map(p => `
                <div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:14px;">${p.name}</span>
                    <button onclick="loadPatient('${p.name}')" style="width:auto; padding:5px 15px; margin:0;">تعديل</button>
                </div>`).join('');
        } catch(e) { listDiv.innerHTML = "خطأ في التحميل"; }
    }

    async function loadPatient(name) {
        document.getElementById('searchName').value = name;
        await searchPatient();
        document.getElementById('patientsModal').style.display = 'none';
    }

    async function searchPatient() {
        const name = document.getElementById('searchName').value;
        const res = await fetch(url + '?name=' + encodeURIComponent(name));
        const data = await res.json();
        if(data.error) alert("غير موجود");
        else {
            document.getElementById('name').value = name;
            document.getElementById('bmi').value = data.bmi;
            document.getElementById('fat').value = data.fat;
            document.getElementById('macros').value = data.macros;
            document.getElementById('dietType').value = data.dietType;
            showResult(name, "تم تحميل بيانات العميل");
        }
    }

    async function processDiet() {
        const payload = { name: document.getElementById('name').value, bmi: document.getElementById('bmi').value, fat: document.getElementById('fat').value, macros: document.getElementById('macros').value, dietType: document.getElementById('dietType').value };
        await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
        showResult(payload.name, "تم الحفظ بنجاح");
    }

    function showResult(name, info) {
        document.getElementById('dietResult').innerHTML = `
            <p><strong>العميل:</strong> ${name}</p>
            <p><span class="print-hide">${info}</span></p>
            <div id="dietTableArea">
                <label style="color:var(--brand-blue); font-weight:700;">النظام الغذائي:</label>
                <div id="dietContent">جاري تحميل النظام...</div>
            </div>`;
        document.getElementById('inputForm').style.display = 'none';
        document.getElementById('output').style.display = 'block';
        document.getElementById('searchOverlay').style.display = 'none';
    }
</script>
</body>
</html>
