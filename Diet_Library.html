<!-- استبدل كود الـ script السكريبت القديم في ملفك بهذا -->
<script>
    async function processDiet() {
        const payload = {
            name: document.getElementById('name').value,
            bmi: document.getElementById('bmi').value,
            fat: document.getElementById('fat').value,
            macros: document.getElementById('macros').value,
            dietType: document.getElementById('dietType').value
        };

        const url = 'رابط_الـ_Deployment_الخاص_بك';

        const response = await fetch(url, {
            method: 'POST',
            body: JSON.stringify(payload)
        });

        const result = await response.json();

        // عرض النتيجة
        document.getElementById('dietResult').innerHTML = `
            <p><strong>اسم المريض:</strong> ${payload.name}</p>
            <p><strong>الخطة المقترحة:</strong> ${result.diet}</p>
        `;
        document.getElementById('inputForm').style.display = 'none';
        document.getElementById('output').style.display = 'block';
    }
</script>
